<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 720px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Segoe UI', Arial, sans-serif;
  color: white; text-align: center;
  overflow: hidden; position: relative;
}
/* Cracked glass effect */
.crack {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background:
    linear-gradient(47deg, transparent 45%, rgba(255,60,60,0.15) 45.5%, rgba(255,60,60,0.15) 46%, transparent 46.5%),
    linear-gradient(130deg, transparent 40%, rgba(255,60,60,0.1) 40.5%, rgba(255,60,60,0.1) 41%, transparent 41.5%),
    linear-gradient(72deg, transparent 55%, rgba(255,60,60,0.08) 55.5%, rgba(255,60,60,0.08) 56%, transparent 56.5%);
  pointer-events: none;
}
.badge {
  display: inline-block;
  padding: 8px 24px; border-radius: 8px;
  background: #DC2626; color: white;
  font-size: 20px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 20px;
}
h1 {
  font-size: 108px; font-weight: 900;
  letter-spacing: -4px; line-height: 1.0;
  text-shadow: 4px 4px 16px rgba(0,0,0,0.5);
  margin-bottom: 12px;
}
h2 {
  font-size: 34px; font-weight: 400;
  opacity: 0.85; margin-bottom: 28px;
}
.features {
  display: flex; gap: 16px; margin-top: 8px;
}
.feature {
  padding: 10px 20px; border-radius: 8px;
  background: rgba(255,255,255,0.1);
  font-size: 18px; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.15);
}
.deposit { background: rgba(234,179,8,0.25); border-color: rgba(234,179,8,0.4); }
.dispute { background: rgba(220,38,38,0.25); border-color: rgba(220,38,38,0.4); }
.exit { background: rgba(34,197,94,0.25); border-color: rgba(34,197,94,0.4); }
.logo {
  position: absolute; bottom: 24px; left: 32px;
  font-size: 22px; font-weight: 800; color: #818CF8;
}
.ep {
  position: absolute; bottom: 24px; right: 32px;
  font-size: 18px; opacity: 0.5;
}
</style>
</head>
<body>
  <div class="crack"></div>
  <div class="badge">Edge Case</div>
  <h1>THE CRASH</h1>
  <h2>Drones, Deposits & Disputes</h2>
  <div class="features">
    <div class="feature deposit">EUR 100 Deposit</div>
    <div class="feature dispute">Damage Dispute</div>
    <div class="feature exit">Clean Exit</div>
  </div>
  <div class="logo">BorrowHood</div>
  <div class="ep">EP15 -- The Garage Sessions</div>
</body>
</html>
