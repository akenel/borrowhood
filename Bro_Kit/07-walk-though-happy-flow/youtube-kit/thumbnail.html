<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:ital,wght@0,400;0,700;1,400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1280px;
  height: 720px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  position: relative;
  background: #0c0a1a;
}

/* ── Layered background ── */
.bg-base {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 25% 50%, rgba(109, 40, 217, 0.35) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 85% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 70% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 60%),
    linear-gradient(160deg, #0f0b2e 0%, #1a1145 40%, #0d1a2e 100%);
}

/* Noise grain overlay */
.grain {
  position: absolute; inset: 0;
  opacity: 0.06;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* Diagonal stripe accent */
.stripe {
  position: absolute;
  top: -40px; right: 520px;
  width: 6px; height: 800px;
  background: linear-gradient(180deg, transparent, rgba(109, 40, 217, 0.5), transparent);
  transform: rotate(12deg);
}
.stripe:nth-child(2) {
  right: 505px;
  width: 2px;
  opacity: 0.4;
}

/* ── Left content ── */
.left {
  position: absolute;
  top: 0; left: 0;
  width: 58%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 48px 40px 48px 64px;
  z-index: 2;
}

.badge-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.badge {
  display: inline-block;
  padding: 6px 16px;
  border: 2px solid rgba(167, 139, 250, 0.6);
  border-radius: 100px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #a78bfa;
  background: rgba(109, 40, 217, 0.15);
}

.duration {
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 700;
  color: #fbbf24;
  background: rgba(251, 191, 36, 0.12);
  border: 2px solid rgba(251, 191, 36, 0.4);
  letter-spacing: 1px;
}

.title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 88px;
  color: #fff;
  line-height: 0.95;
  letter-spacing: -2px;
  margin-bottom: 14px;
  text-shadow: 0 4px 30px rgba(109, 40, 217, 0.4);
}

.subtitle {
  font-size: 26px;
  color: rgba(203, 213, 225, 0.85);
  font-weight: 400;
  margin-bottom: 36px;
  line-height: 1.3;
}

/* Flow steps at bottom */
.flow {
  display: flex;
  align-items: center;
  gap: 0;
}

.flow-step {
  display: flex;
  align-items: center;
  gap: 0;
}

.flow-label {
  font-size: 15px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 8px 16px;
  border-radius: 8px;
  white-space: nowrap;
}

.flow-arrow {
  color: rgba(148, 163, 184, 0.4);
  font-size: 22px;
  margin: 0 6px;
  font-weight: 400;
}

.fl-browse { color: #a78bfa; background: rgba(167, 139, 250, 0.12); }
.fl-rent   { color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
.fl-return { color: #38bdf8; background: rgba(56, 189, 248, 0.1); }
.fl-done   { color: #34d399; background: rgba(52, 211, 153, 0.1); }

/* ── Right panel ── */
.right {
  position: absolute;
  top: 0; right: 0;
  width: 45%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

.card {
  width: 420px;
  background: rgba(15, 12, 40, 0.85);
  border: 1px solid rgba(167, 139, 250, 0.2);
  border-radius: 20px;
  padding: 36px 32px;
  backdrop-filter: blur(20px);
  box-shadow:
    0 0 60px rgba(109, 40, 217, 0.15),
    0 20px 40px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.card-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: rgba(148, 163, 184, 0.5);
  margin-bottom: 24px;
  font-weight: 700;
}

/* State machine visualization */
.states {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.state-row {
  display: flex;
  align-items: center;
  gap: 14px;
}

.state-dot {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 900;
  flex-shrink: 0;
  position: relative;
}

.state-connector {
  width: 36px;
  display: flex;
  justify-content: center;
  padding: 2px 0;
}

.state-connector .line {
  width: 2px;
  height: 16px;
  border-radius: 1px;
}

.state-text {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.state-sub {
  font-size: 12px;
  color: rgba(148, 163, 184, 0.45);
  font-weight: 400;
  margin-left: 4px;
}

.s-pending .state-dot  { background: rgba(251, 191, 36, 0.15); border: 2px solid #fbbf24; color: #fbbf24; }
.s-pending .state-text { color: #fbbf24; }
.s-pending .line       { background: linear-gradient(180deg, #fbbf24, #22c55e); }

.s-approved .state-dot  { background: rgba(34, 197, 94, 0.15); border: 2px solid #22c55e; color: #22c55e; }
.s-approved .state-text { color: #22c55e; }
.s-approved .line       { background: linear-gradient(180deg, #22c55e, #38bdf8); }

.s-pickup .state-dot  { background: rgba(56, 189, 248, 0.15); border: 2px solid #38bdf8; color: #38bdf8; }
.s-pickup .state-text { color: #38bdf8; }
.s-pickup .line       { background: linear-gradient(180deg, #38bdf8, #34d399); }

.s-complete .state-dot  { background: rgba(52, 211, 153, 0.2); border: 2px solid #34d399; color: #34d399; }
.s-complete .state-text { color: #34d399; }

/* Lockbox section */
.lockbox {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid rgba(148, 163, 184, 0.1);
  display: flex;
  align-items: center;
  gap: 16px;
}

.lockbox-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: rgba(251, 191, 36, 0.1);
  border: 1px solid rgba(251, 191, 36, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.lockbox-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: rgba(148, 163, 184, 0.4);
  font-weight: 700;
  margin-bottom: 4px;
}

.lockbox-code {
  font-family: 'Archivo Black', monospace;
  font-size: 22px;
  color: #fbbf24;
  letter-spacing: 4px;
}

/* Bottom-right watermark */
.watermark {
  position: absolute;
  bottom: 24px;
  right: 36px;
  font-size: 13px;
  color: rgba(148, 163, 184, 0.25);
  letter-spacing: 1px;
  z-index: 3;
}

</style></head>
<body>
  <div class="bg-base"></div>
  <div class="grain"></div>
  <div class="stripe"></div>
  <div class="stripe"></div>

  <!-- Left -->
  <div class="left">
    <div class="badge-row">
      <div class="badge">Full Walkthrough</div>
      <div class="duration">6 min</div>
    </div>

    <div class="title">BORROW<br>HOOD</div>

    <div class="subtitle">Every garage becomes<br>a rental shop.</div>

    <div class="flow">
      <span class="flow-label fl-browse">Browse</span>
      <span class="flow-arrow">&#8594;</span>
      <span class="flow-label fl-rent">Rent</span>
      <span class="flow-arrow">&#8594;</span>
      <span class="flow-label fl-return">Return</span>
      <span class="flow-arrow">&#8594;</span>
      <span class="flow-label fl-done">Done &#10003;</span>
    </div>
  </div>

  <!-- Right -->
  <div class="right">
    <div class="card">
      <div class="card-title">Rental State Machine</div>

      <div class="states">
        <div class="state-row s-pending">
          <div class="state-dot">1</div>
          <div class="state-text">Pending <span class="state-sub">Sally requests</span></div>
        </div>
        <div class="state-connector s-pending"><div class="line"></div></div>

        <div class="state-row s-approved">
          <div class="state-dot">2</div>
          <div class="state-text">Approved <span class="state-sub">Mike approves</span></div>
        </div>
        <div class="state-connector s-approved"><div class="line"></div></div>

        <div class="state-row s-pickup">
          <div class="state-dot">3</div>
          <div class="state-text">Picked Up <span class="state-sub">Lockbox code</span></div>
        </div>
        <div class="state-connector s-pickup"><div class="line"></div></div>

        <div class="state-row s-complete">
          <div class="state-dot">&#10003;</div>
          <div class="state-text">Completed <span class="state-sub">Deposit released</span></div>
        </div>
      </div>

      <div class="lockbox">
        <div class="lockbox-icon">&#128274;</div>
        <div>
          <div class="lockbox-label">Lockbox Code</div>
          <div class="lockbox-code">2AK6B5FN</div>
        </div>
      </div>
    </div>
  </div>

  <div class="watermark">github.com/akenel/borrowhood</div>
</body></html>
