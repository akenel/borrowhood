<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1280px; height: 720px;
  overflow: hidden;
  font-family: 'Outfit', sans-serif;
  color: white;
  background: #0a0f1e;
  position: relative;
}

/* ── Amber urgency glow from center-right ── */
.glow-amber {
  position: absolute;
  width: 900px; height: 900px;
  background: radial-gradient(circle, rgba(217,119,6,0.10) 0%, transparent 60%);
  top: -100px; right: -100px;
  z-index: 0;
}
.glow-red {
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(220,38,38,0.07) 0%, transparent 65%);
  bottom: -80px; left: 100px;
  z-index: 0;
}
.glow-warm {
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(251,191,36,0.05) 0%, transparent 60%);
  top: 100px; left: 300px;
  z-index: 0;
}

/* ── Top accent line (auction heat gradient) ── */
.top-accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(
    90deg,
    #DC2626 0%, #D97706 35%, #F59E0B 65%, #059669 100%
  );
  z-index: 40;
  opacity: 0.85;
}

/* ── Subtle grid pattern (auction board feel) ── */
.grid-bg {
  position: absolute;
  inset: 0;
  z-index: 1;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(ellipse 70% 60% at 65% 50%, black 0%, transparent 100%);
}

/* ── Layout ── */
.container {
  display: flex;
  width: 100%; height: 100%;
  position: relative;
  z-index: 10;
}

/* ── LEFT SIDE ── */
.left {
  width: 55%;
  padding: 52px 30px 40px 56px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
}

.badge-auction {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 20px;
  border-radius: 20px;
  border: 2px solid #D97706;
  background: rgba(217,119,6,0.08);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: #fbbf24;
  letter-spacing: 3px;
  text-transform: uppercase;
  width: fit-content;
  margin-bottom: 22px;
}
.badge-auction::before {
  content: '';
  width: 8px; height: 8px;
  background: #fbbf24;
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(251,191,36,0.5);
  animation: pulse-dot 1.5s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.heading {
  font-size: 72px;
  font-weight: 900;
  line-height: 1.0;
  letter-spacing: -1px;
  margin-bottom: 36px;
  background: linear-gradient(170deg, #ffffff 15%, #fbbf24 55%, #D97706 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ── Feature list ── */
.features {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 32px;
  position: relative;
}
.features::before {
  content: '';
  position: absolute;
  left: 6px;
  top: 7px;
  bottom: 7px;
  width: 2px;
  background: linear-gradient(
    180deg,
    rgba(217,119,6,0.4) 0%,
    rgba(220,38,38,0.3) 33%,
    rgba(5,150,105,0.3) 66%,
    rgba(67,56,202,0.3) 100%
  );
  border-radius: 1px;
}

.feature-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding-left: 0;
}
.feature-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}
.feature-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 21px;
  font-weight: 700;
  color: #c8c8d4;
  letter-spacing: 0.5px;
}
.dot-amber { background: #D97706; box-shadow: 0 0 14px rgba(217,119,6,0.5); }
.dot-red { background: #DC2626; box-shadow: 0 0 14px rgba(220,38,38,0.5); }
.dot-emerald { background: #059669; box-shadow: 0 0 14px rgba(5,150,105,0.5); }
.dot-indigo { background: #4338CA; box-shadow: 0 0 14px rgba(67,56,202,0.5); }

/* ── Duration badge ── */
.duration {
  position: absolute;
  bottom: 40px; left: 56px;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: #7a7a8e;
  letter-spacing: 1px;
}
.duration-icon { font-size: 13px; }

/* ── Vertical divider ── */
.divider {
  width: 1px;
  background: linear-gradient(
    180deg,
    transparent 5%,
    rgba(217,119,6,0.3) 25%,
    rgba(220,38,38,0.2) 50%,
    rgba(5,150,105,0.25) 75%,
    transparent 95%
  );
  align-self: stretch;
  margin: 30px 0;
}

/* ── RIGHT SIDE ── */
.right {
  width: 45%;
  padding: 36px 44px 40px 32px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 12px;
}

/* ── Countdown display ── */
.countdown {
  text-align: center;
  margin-bottom: 8px;
  position: relative;
}
.countdown-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 52px;
  font-weight: 800;
  color: #fbbf24;
  letter-spacing: 4px;
  text-shadow: 0 0 30px rgba(251,191,36,0.3);
}
.countdown-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: #7a7a8e;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 2px;
}

/* ── Bid cards ── */
.bid-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-radius: 10px;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
}
.bid-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 4px 0 0 4px;
}
.bid-amber::before { background: #D97706; box-shadow: 0 0 16px rgba(217,119,6,0.3); }
.bid-amber { border-color: rgba(217,119,6,0.12); }
.bid-red::before { background: #DC2626; box-shadow: 0 0 16px rgba(220,38,38,0.3); }
.bid-red { border-color: rgba(220,38,38,0.12); }
.bid-green::before { background: #059669; box-shadow: 0 0 16px rgba(5,150,105,0.3); }
.bid-green { border-color: rgba(5,150,105,0.12); }
.bid-gold::before { background: #F59E0B; box-shadow: 0 0 20px rgba(245,158,11,0.4); }
.bid-gold { border-color: rgba(245,158,11,0.15); background: rgba(245,158,11,0.03); }

.bid-icon {
  width: 46px; height: 46px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.icon-amber { background: rgba(217,119,6,0.12); color: #fbbf24; }
.icon-red { background: rgba(220,38,38,0.12); color: #f87171; }
.icon-green { background: rgba(5,150,105,0.12); color: #34d399; }
.icon-gold { background: rgba(245,158,11,0.12); color: #fbbf24; }

.bid-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}
.bid-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 1px;
}
.text-amber { color: #fbbf24; }
.text-red { color: #f87171; }
.text-green { color: #34d399; }
.text-gold { color: #fbbf24; }

.bid-who {
  font-size: 12px;
  color: #5a5a6e;
  font-weight: 400;
}

.bid-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 10px;
  text-transform: uppercase;
  flex-shrink: 0;
}
.badge-winning {
  background: rgba(5,150,105,0.15);
  color: #34d399;
  border: 1px solid rgba(5,150,105,0.25);
}
.badge-outbid {
  background: rgba(220,38,38,0.1);
  color: #f87171;
  border: 1px solid rgba(220,38,38,0.2);
}
.badge-sold {
  background: rgba(245,158,11,0.15);
  color: #fbbf24;
  border: 1px solid rgba(245,158,11,0.3);
}

/* ── Brand ── */
.brand {
  position: absolute;
  bottom: 40px; right: 44px;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #4a4a5c;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.brand-dot {
  width: 4px; height: 4px;
  background: #4a4a5c;
  border-radius: 50%;
}

/* ── Video number tag ── */
.ep-tag {
  position: absolute;
  top: 18px; right: 44px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: #3a3a4c;
  letter-spacing: 3px;
  text-transform: uppercase;
  z-index: 20;
}
</style></head>
<body>
  <div class="glow-amber"></div>
  <div class="glow-red"></div>
  <div class="glow-warm"></div>
  <div class="top-accent"></div>
  <div class="grid-bg"></div>
  <div class="ep-tag">EP 04</div>

  <div class="container">
    <div class="left">
      <div class="badge-auction">AUCTION</div>
      <div class="heading">THE<br>AUCTION</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#7a7a8e;letter-spacing:2px;margin-top:-28px;margin-bottom:28px">DJI MINI 3 PRO</div>
      <div class="features">
        <div class="feature-row">
          <div class="feature-dot dot-amber"></div>
          <div class="feature-label">Live Bids</div>
        </div>
        <div class="feature-row">
          <div class="feature-dot dot-red"></div>
          <div class="feature-label">Reserve Price</div>
        </div>
        <div class="feature-row">
          <div class="feature-dot dot-emerald"></div>
          <div class="feature-label">Anti-Snipe</div>
        </div>
        <div class="feature-row">
          <div class="feature-dot dot-indigo"></div>
          <div class="feature-label">Winner Takes All</div>
        </div>
      </div>
      <div class="duration">
        <span class="duration-icon">&#9654;</span>
        3 MIN
      </div>
    </div>

    <div class="divider"></div>

    <div class="right">
      <div class="countdown">
        <div class="countdown-time">1:47</div>
        <div class="countdown-label">Time Remaining</div>
      </div>

      <div class="bid-card bid-amber">
        <div class="bid-icon icon-amber">&#9650;</div>
        <div class="bid-text">
          <div class="bid-amount text-amber">EUR 80</div>
          <div class="bid-who">Sally Thompson</div>
        </div>
        <div class="bid-badge badge-outbid">Outbid</div>
      </div>

      <div class="bid-card bid-red">
        <div class="bid-icon icon-red">&#9650;</div>
        <div class="bid-text">
          <div class="bid-amount text-red">EUR 150</div>
          <div class="bid-who">Mike Kenel</div>
        </div>
        <div class="bid-badge badge-outbid">Outbid</div>
      </div>

      <div class="bid-card bid-green">
        <div class="bid-icon icon-green">&#9650;</div>
        <div class="bid-text">
          <div class="bid-amount text-green">EUR 250</div>
          <div class="bid-who">Sally Thompson</div>
        </div>
        <div class="bid-badge badge-winning">Reserve Met</div>
      </div>

      <div class="bid-card bid-gold">
        <div class="bid-icon icon-gold">&#9733;</div>
        <div class="bid-text">
          <div class="bid-amount text-gold">SOLD</div>
          <div class="bid-who">DJI Mini 3 Pro -- Beginner Friendly</div>
        </div>
        <div class="bid-badge badge-sold">Winner</div>
      </div>
    </div>
  </div>

  <div class="brand">
    <span class="brand-text">BorrowHood</span>
    <span class="brand-dot"></span>
    <span class="brand-text">Garage Sessions</span>
  </div>
</body></html>
