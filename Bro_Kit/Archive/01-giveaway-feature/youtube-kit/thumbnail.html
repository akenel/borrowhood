<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f172a;
    position: relative;
  }

  /* Background: the browse page screenshot, cropped to item cards */
  .bg-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('thumb-browse.jpg') no-repeat;
    background-size: cover;
    background-position: center bottom;
    filter: brightness(0.35);
  }

  /* Gradient overlay from left */
  .gradient-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      135deg,
      rgba(5, 150, 105, 0.92) 0%,
      rgba(5, 150, 105, 0.75) 35%,
      rgba(15, 23, 42, 0.6) 65%,
      rgba(15, 23, 42, 0.3) 100%
    );
  }

  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    padding: 50px 60px;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .right {
    width: 480px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
  }

  /* Main title */
  .title-free {
    font-size: 120px;
    font-weight: 900;
    color: white;
    line-height: 1;
    text-shadow: 3px 3px 12px rgba(0,0,0,0.5);
    letter-spacing: -2px;
  }

  .title-stuff {
    font-size: 100px;
    font-weight: 900;
    color: #fbbf24;
    line-height: 1;
    text-shadow: 3px 3px 12px rgba(0,0,0,0.5);
    letter-spacing: -2px;
    margin-bottom: 20px;
  }

  .subtitle {
    font-size: 32px;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    line-height: 1.4;
  }

  .brand {
    margin-top: 30px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-dot {
    width: 18px;
    height: 18px;
    background: #fbbf24;
    border-radius: 50%;
  }

  .brand-name {
    font-size: 28px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Item preview cards on right */
  .preview-card {
    width: 340px;
    height: 180px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    border: 3px solid rgba(255,255,255,0.2);
  }

  .preview-card img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .preview-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: #059669;
    color: white;
    font-size: 16px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .preview-free {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(0,0,0,0.7);
    color: #34d399;
    font-size: 22px;
    font-weight: 800;
    padding: 4px 16px;
    border-radius: 8px;
  }

  .preview-label {
    position: absolute;
    bottom: 12px;
    left: 12px;
    color: white;
    font-size: 18px;
    font-weight: 600;
    text-shadow: 1px 1px 6px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="gradient-overlay"></div>

  <div class="content">
    <div class="left">
      <div class="title-free">GIVEAWAY</div>
      <div class="title-stuff">FEATURE</div>
      <div class="subtitle">
        Claim it. Pick it up. Done.<br>
        No pricing. No deposits. No returns.
      </div>
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-name">BorrowHood</div>
      </div>
    </div>

    <div class="right">
      <div class="preview-card">
        <img src="https://images.unsplash.com/photo-1715407157720-aff745f27568?w=800&h=600&fit=crop&q=80" alt="Garden Hose">
        <div class="preview-badge">Give Away</div>
        <div class="preview-label">Garden Hose</div>
        <div class="preview-free">FREE</div>
      </div>
      <div class="preview-card">
        <img src="https://images.unsplash.com/photo-1692681261954-bbd8aaf9919b?w=800&h=600&fit=crop&q=80" alt="Kids Bicycle">
        <div class="preview-badge">Give Away</div>
        <div class="preview-label">Kids' Bicycle</div>
        <div class="preview-free">FREE</div>
      </div>
    </div>
  </div>
</body>
</html>
