<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 720px; overflow: hidden;
  background: linear-gradient(135deg, #0F172A 0%, #1E293B 40%, #1E293B 60%, #0F172A 100%);
  font-family: 'Segoe UI', Arial, sans-serif;
  color: white;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}

/* Three colored accent bars at top */
.accent-bars {
  position: absolute; top: 0; left: 0; right: 0; height: 8px;
  display: flex;
}
.accent-bars .bar { flex: 1; }
.bar-amber { background: linear-gradient(90deg, #B45309, #F59E0B); }
.bar-crimson { background: linear-gradient(90deg, #DC2626, #EF4444); }
.bar-indigo { background: linear-gradient(90deg, #4F46E5, #818CF8); }

/* Main title */
h1 {
  font-size: 96px; font-weight: 900;
  letter-spacing: -3px; line-height: 1.0;
  text-shadow: 4px 4px 16px rgba(0,0,0,0.5);
  margin-bottom: 12px;
}

/* Subtitle */
h2 {
  font-size: 42px; font-weight: 400;
  opacity: 0.85; margin-bottom: 32px;
}

/* Stats row */
.stats {
  display: flex; gap: 60px;
  margin-bottom: 36px;
}
.stat-block { text-align: center; }
.stat-num {
  font-size: 72px; font-weight: 900;
  color: #FCD34D;
  line-height: 1.0;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
}
.stat-label {
  font-size: 24px; opacity: 0.6;
  margin-top: 4px;
}

/* Era pills */
.eras {
  display: flex; gap: 16px;
}
.era-pill {
  padding: 10px 24px;
  border-radius: 999px;
  font-size: 22px; font-weight: 700;
  letter-spacing: 1px;
}
.era-amber { background: rgba(180, 83, 9, 0.7); }
.era-crimson { background: rgba(220, 38, 38, 0.7); }
.era-indigo { background: rgba(79, 70, 229, 0.7); }

/* BorrowHood brand */
.brand {
  position: absolute; bottom: 24px; right: 32px;
  font-size: 28px; font-weight: 700;
  color: #818CF8; opacity: 0.8;
}

/* Episode badge */
.episode {
  position: absolute; top: 24px; right: 32px;
  font-size: 20px; font-weight: 600;
  background: rgba(255,255,255,0.1);
  padding: 8px 20px; border-radius: 8px;
}
</style>
</head>
<body>

<div class="accent-bars">
  <div class="bar bar-amber"></div>
  <div class="bar bar-crimson"></div>
  <div class="bar bar-indigo"></div>
</div>

<div class="episode">EPISODE 5</div>

<h1>THE LEGENDS</h1>
<h2>272 Members. 10 Eras. One Brotherhood.</h2>

<div class="stats">
  <div class="stat-block">
    <div class="stat-num">315</div>
    <div class="stat-label">MEMBERS</div>
  </div>
  <div class="stat-block">
    <div class="stat-num">721</div>
    <div class="stat-label">ITEMS</div>
  </div>
  <div class="stat-block">
    <div class="stat-num">272</div>
    <div class="stat-label">LEGENDS</div>
  </div>
</div>

<div class="eras">
  <span class="era-pill era-amber">CINEMA</span>
  <span class="era-pill era-crimson">WARRIORS</span>
  <span class="era-pill era-indigo">INVENTORS</span>
</div>

<div class="brand">BorrowHood</div>

</body>
</html>
