<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f172a;
    position: relative;
  }

  /* Background: the drone detail page */
  .bg-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('thumb-drone-detail.jpg') no-repeat;
    background-size: cover;
    background-position: center;
    filter: brightness(0.3);
  }

  /* Blue gradient overlay */
  .gradient-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      135deg,
      rgba(30, 64, 175, 0.92) 0%,
      rgba(30, 64, 175, 0.75) 35%,
      rgba(15, 23, 42, 0.6) 65%,
      rgba(15, 23, 42, 0.3) 100%
    );
  }

  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    padding: 50px 60px;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .right {
    width: 480px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
  }

  /* Main title */
  .title-line1 {
    font-size: 100px;
    font-weight: 900;
    color: white;
    line-height: 1;
    text-shadow: 3px 3px 12px rgba(0,0,0,0.5);
    letter-spacing: -2px;
  }

  .title-line2 {
    font-size: 100px;
    font-weight: 900;
    color: #60a5fa;
    line-height: 1;
    text-shadow: 3px 3px 12px rgba(0,0,0,0.5);
    letter-spacing: -2px;
    margin-bottom: 20px;
  }

  .subtitle {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    line-height: 1.4;
  }

  .brand {
    margin-top: 30px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-dot {
    width: 18px;
    height: 18px;
    background: #60a5fa;
    border-radius: 50%;
  }

  .brand-name {
    font-size: 28px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Flow steps on right */
  .flow-step {
    width: 360px;
    padding: 20px 28px;
    border-radius: 16px;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .flow-num {
    font-size: 42px;
    font-weight: 900;
    color: rgba(255,255,255,0.3);
    min-width: 45px;
  }

  .flow-title {
    font-size: 28px;
    font-weight: 700;
    color: white;
  }

  .flow-desc {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }

  .flow-step.hold { border-left: 4px solid #4ade80; }
  .flow-step.release { border-left: 4px solid #60a5fa; }
  .flow-step.forfeit { border-left: 4px solid #f87171; }

  .flow-arrow {
    font-size: 24px;
    color: rgba(255,255,255,0.3);
    text-align: center;
  }
</style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="gradient-overlay"></div>

  <div class="content">
    <div class="left">
      <div class="title-line1">SECURITY</div>
      <div class="title-line2">DEPOSITS</div>
      <div class="subtitle">
        Hold at pickup. Release on return.<br>
        Forfeit on damage. Dispute built in.
      </div>
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-name">BorrowHood</div>
      </div>
    </div>

    <div class="right">
      <div class="flow-step hold">
        <div class="flow-num">1</div>
        <div>
          <div class="flow-title">HOLD</div>
          <div class="flow-desc">Deposit paid at pickup</div>
        </div>
      </div>
      <div class="flow-arrow">&#9660;</div>
      <div class="flow-step release">
        <div class="flow-num">2</div>
        <div>
          <div class="flow-title">RELEASE</div>
          <div class="flow-desc">Auto-released on return</div>
        </div>
      </div>
      <div class="flow-arrow">&#9660;</div>
      <div class="flow-step forfeit">
        <div class="flow-num">3</div>
        <div>
          <div class="flow-title">FORFEIT</div>
          <div class="flow-desc">Kept if item damaged</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
