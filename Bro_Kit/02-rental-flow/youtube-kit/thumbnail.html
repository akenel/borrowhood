<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f172a;
    position: relative;
  }

  .bg-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('thumb-drill-detail.jpg') no-repeat;
    background-size: cover;
    background-position: center;
    filter: brightness(0.3);
  }

  .gradient-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      135deg,
      rgba(67, 56, 202, 0.92) 0%,
      rgba(67, 56, 202, 0.75) 35%,
      rgba(15, 23, 42, 0.6) 65%,
      rgba(15, 23, 42, 0.3) 100%
    );
  }

  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    padding: 50px 60px;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .right {
    width: 440px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }

  .title-line1 {
    font-size: 110px;
    font-weight: 900;
    color: white;
    line-height: 1;
    text-shadow: 3px 3px 12px rgba(0,0,0,0.5);
    letter-spacing: -2px;
  }

  .title-line2 {
    font-size: 90px;
    font-weight: 900;
    color: #fbbf24;
    line-height: 1;
    text-shadow: 3px 3px 12px rgba(0,0,0,0.5);
    letter-spacing: -2px;
    margin-bottom: 20px;
  }

  .subtitle {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    line-height: 1.4;
  }

  .brand {
    margin-top: 30px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-dot {
    width: 18px;
    height: 18px;
    background: #fbbf24;
    border-radius: 50%;
  }

  .brand-name {
    font-size: 28px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* State machine steps on right */
  .state-flow {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  .state-step {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .state-num {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
  }

  .state-num.blue { background: #3b82f6; }
  .state-num.green { background: #10b981; }
  .state-num.amber { background: #f59e0b; }
  .state-num.purple { background: #8b5cf6; }
  .state-num.emerald { background: #059669; }

  .state-label {
    font-size: 20px;
    font-weight: 600;
    color: white;
  }

  .state-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="gradient-overlay"></div>

  <div class="content">
    <div class="left">
      <div class="title-line1">RENTAL</div>
      <div class="title-line2">FLOW</div>
      <div class="subtitle">
        Request. Approve. Pick up.<br>
        Return. Complete.
      </div>
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-name">BorrowHood</div>
      </div>
    </div>

    <div class="right">
      <div class="state-flow">
        <div class="state-step">
          <div class="state-num blue">1</div>
          <div>
            <div class="state-label">Request</div>
            <div class="state-sub">Pick dates, send message</div>
          </div>
        </div>
        <div class="state-step">
          <div class="state-num green">2</div>
          <div>
            <div class="state-label">Approve</div>
            <div class="state-sub">Owner generates lock box codes</div>
          </div>
        </div>
        <div class="state-step">
          <div class="state-num amber">3</div>
          <div>
            <div class="state-label">Pick Up</div>
            <div class="state-sub">Contactless exchange</div>
          </div>
        </div>
        <div class="state-step">
          <div class="state-num purple">4</div>
          <div>
            <div class="state-label">Return</div>
            <div class="state-sub">Verify with return code</div>
          </div>
        </div>
        <div class="state-step">
          <div class="state-num emerald">5</div>
          <div>
            <div class="state-label">Complete</div>
            <div class="state-sub">Both earn points</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
