<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px;
    background: linear-gradient(135deg, #1e3a5f 0%, #0c4a6e 30%, #0369a1 70%, #0ea5e9 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    position: relative;
  }
  .badge {
    position: absolute;
    top: 24px; left: 24px;
    background: rgba(0,0,0,0.5);
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .ep {
    position: absolute;
    top: 24px; right: 24px;
    background: #DC2626;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 24px;
    font-weight: 700;
  }
  .icon {
    font-size: 120px;
    margin-bottom: 16px;
    text-shadow: 4px 4px 20px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 96px;
    font-weight: 900;
    text-shadow: 4px 4px 16px rgba(0,0,0,0.5);
    letter-spacing: -2px;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  h2 {
    font-size: 40px;
    font-weight: 400;
    opacity: 0.9;
    margin-bottom: 24px;
  }
  .cast {
    font-size: 28px;
    opacity: 0.7;
    max-width: 900px;
  }
  .cast span { color: #FCD34D; font-weight: 700; }
  .bottom {
    position: absolute;
    bottom: 24px;
    font-size: 20px;
    opacity: 0.4;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="badge">BORROWHOOD</div>
  <div class="ep">S1 EP03</div>
  <div class="icon">&#128640;</div>
  <h1>THE SCOOTER</h1>
  <h2>Wind, Wheels & a Welding Job</h2>
  <div class="cast">
    <span>Leo</span> fixes the bike.
    <span>Sally</span> buys the scooter.
    <span>Johnny</span> delivers in the wind.
    <span>Mike's</span> welder makes it possible.
  </div>
  <div class="bottom">Notion Motion Pictures</div>
</body>
</html>
