<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 720px;
  background: linear-gradient(135deg, #1E293B 0%, #334155 50%, #1E293B 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Segoe UI', Arial, sans-serif;
  color: white; text-align: center;
  overflow: hidden; position: relative;
}
/* Decorative gear/wrench watermark */
.watermark {
  position: absolute; top: -40px; right: -40px;
  font-size: 300px; opacity: 0.05;
  transform: rotate(15deg);
}
.badge {
  display: inline-block;
  padding: 8px 24px; border-radius: 8px;
  background: #7C3AED; color: white;
  font-size: 20px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 20px;
}
h1 {
  font-size: 96px; font-weight: 900;
  letter-spacing: -3px; line-height: 1.0;
  text-shadow: 4px 4px 16px rgba(0,0,0,0.5);
  margin-bottom: 16px;
}
h2 {
  font-size: 36px; font-weight: 400;
  opacity: 0.85; margin-bottom: 24px;
}
.features {
  display: flex; gap: 20px; margin-top: 8px;
}
.feature {
  padding: 10px 20px; border-radius: 8px;
  background: rgba(255,255,255,0.1);
  font-size: 18px; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.15);
}
.logo {
  position: absolute; bottom: 24px; left: 32px;
  font-size: 22px; font-weight: 800; color: #818CF8;
}
.ep {
  position: absolute; bottom: 24px; right: 32px;
  font-size: 18px; opacity: 0.5;
}
.danger {
  background: #DC2626; border-color: #DC2626;
}
</style>
</head>
<body>
  <div class="watermark">&#9881;</div>
  <div class="badge">New Feature</div>
  <h1>THE WORKSHOP</h1>
  <h2>Skills, Services, Quotes & Account Deletion</h2>
  <div class="features">
    <div class="feature">Verified Skills</div>
    <div class="feature">Service Quotes</div>
    <div class="feature danger">Delete Account</div>
  </div>
  <div class="logo">BorrowHood</div>
  <div class="ep">EP14 -- The Garage Sessions</div>
</body>
</html>
