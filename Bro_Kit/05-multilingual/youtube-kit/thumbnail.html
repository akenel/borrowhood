<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f172a;
    position: relative;
  }

  .gradient-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      135deg,
      #0284c7 0%,
      #0369a1 35%,
      #1e40af 65%,
      #4f46e5 100%
    );
  }

  .split-line {
    position: absolute;
    top: 0;
    left: 50%;
    width: 4px;
    height: 100%;
    background: rgba(255,255,255,0.3);
    z-index: 5;
  }

  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
  }

  .half {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
  }

  .half.left {
    background: rgba(0,0,0,0.15);
  }

  .half.right {
    background: rgba(0,0,0,0.25);
  }

  .flag {
    font-size: 80px;
    margin-bottom: 20px;
    filter: drop-shadow(2px 2px 6px rgba(0,0,0,0.3));
  }

  .lang-name {
    font-size: 42px;
    font-weight: 800;
    color: white;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
    margin-bottom: 24px;
  }

  .sample-labels {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 400px;
  }

  .label-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.12);
  }

  .label-icon {
    font-size: 18px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .label-text {
    font-size: 17px;
    font-weight: 600;
    color: white;
  }

  .label-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-left: auto;
  }

  /* Center title overlay */
  .center-title {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    text-align: center;
  }

  .main-title {
    font-size: 52px;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 40px rgba(0,0,0,0.8), 2px 2px 12px rgba(0,0,0,0.6);
    letter-spacing: -1px;
    background: rgba(0,0,0,0.5);
    padding: 12px 36px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .switch-arrow {
    font-size: 36px;
    color: #fde68a;
    margin-top: 8px;
    text-shadow: 0 0 20px rgba(0,0,0,0.6);
  }

  .brand {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-dot {
    width: 14px;
    height: 14px;
    background: #fde68a;
    border-radius: 50%;
  }

  .brand-name {
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .ep-badge {
    position: absolute;
    top: 24px;
    right: 30px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 20;
  }

  .finale-tag {
    position: absolute;
    top: 24px;
    left: 30px;
    background: #dc2626;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 14px;
    font-weight: 700;
    color: white;
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 20;
  }
</style>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="split-line"></div>

  <div class="finale-tag">FINALE</div>
  <div class="ep-badge">EP 5</div>

  <div class="content">
    <div class="half left">
      <div class="flag">&#127468;&#127463;</div>
      <div class="lang-name">English</div>
      <div class="sample-labels">
        <div class="label-row">
          <span class="label-icon">&#127968;</span>
          <span class="label-text">Home</span>
        </div>
        <div class="label-row">
          <span class="label-icon">&#128269;</span>
          <span class="label-text">Browse Items</span>
        </div>
        <div class="label-row">
          <span class="label-icon">&#128100;</span>
          <span class="label-text">Members</span>
        </div>
        <div class="label-row">
          <span class="label-icon">&#11088;</span>
          <span class="label-text">Leave a Review</span>
        </div>
        <div class="label-row">
          <span class="label-icon">&#127873;</span>
          <span class="label-text">Give Away</span>
        </div>
      </div>
    </div>

    <div class="half right">
      <div class="flag">&#127470;&#127481;</div>
      <div class="lang-name">Italiano</div>
      <div class="sample-labels">
        <div class="label-row">
          <span class="label-icon">&#127968;</span>
          <span class="label-text">Home</span>
        </div>
        <div class="label-row">
          <span class="label-icon">&#128269;</span>
          <span class="label-text">Esplora Oggetti</span>
        </div>
        <div class="label-row">
          <span class="label-icon">&#128100;</span>
          <span class="label-text">Membri</span>
        </div>
        <div class="label-row">
          <span class="label-icon">&#11088;</span>
          <span class="label-text">Lascia una Recensione</span>
        </div>
        <div class="label-row">
          <span class="label-icon">&#127873;</span>
          <span class="label-text">Regalo</span>
        </div>
      </div>
    </div>
  </div>

  <div class="center-title">
    <div class="main-title">MULTILINGUAL</div>
    <div class="switch-arrow">&#8596; LIVE SWITCH</div>
  </div>

  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-name">BorrowHood</div>
  </div>
</body>
</html>
