{% extends "base.html" %}

{% block title %}{{ t('app.name') }} - AI Concierge{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-6" x-data="chatApp()" x-init="init()">

    <!-- Header -->
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-900">
            {{ t('i18n.ai_concierge') }}
        </h1>
        <p class="text-sm text-gray-500 mt-1">
            {{ t('i18n.ask_anything_about_items_services_or_community_mem') }}
        </p>
    </div>

    <!-- Chat messages area -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex flex-col" style="height: calc(100vh - 16rem);">

        <!-- Messages -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4" x-ref="messages">

            <!-- Welcome message -->
            <div x-show="messages.length === 0" class="text-center py-12">
                <div class="w-16 h-16 mx-auto mb-4 bg-indigo-100 rounded-full flex items-center justify-center">
                    <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                    </svg>
                </div>
                <p class="text-gray-600 font-medium">{{ t('i18n.how_can_i_help_you') }}</p>
                <div class="flex flex-wrap justify-center gap-2 mt-4">
                    <button @click="sendQuery('Who has a drill?')" class="px-3 py-1.5 text-sm bg-indigo-50 text-indigo-700 rounded-full hover:bg-indigo-100 transition-colors">Who has a drill?</button>
                    <button @click="sendQuery('Find me a bicycle')" class="px-3 py-1.5 text-sm bg-indigo-50 text-indigo-700 rounded-full hover:bg-indigo-100 transition-colors">Find me a bicycle</button>
                    <button @click="sendQuery('Who speaks Italian?')" class="px-3 py-1.5 text-sm bg-indigo-50 text-indigo-700 rounded-full hover:bg-indigo-100 transition-colors">Who speaks Italian?</button>
                    <button @click="sendQuery('Show me camping gear')" class="px-3 py-1.5 text-sm bg-indigo-50 text-indigo-700 rounded-full hover:bg-indigo-100 transition-colors">Show me camping gear</button>
                </div>
            </div>

            <!-- Message bubbles -->
            <template x-for="(msg, idx) in messages" :key="idx">
                <div>
                    <!-- User message -->
                    <div x-show="msg.role === 'user'" class="flex justify-end">
                        <div class="max-w-[80%] bg-indigo-600 text-white px-4 py-2.5 rounded-2xl rounded-br-md">
                            <p class="text-sm" x-text="msg.text"></p>
                        </div>
                    </div>

                    <!-- Bot message -->
                    <div x-show="msg.role === 'bot'" class="flex justify-start">
                        <div class="max-w-[85%] space-y-3">
                            <!-- Response text (markdown rendered) -->
                            <div class="bg-gray-100 px-4 py-2.5 rounded-2xl rounded-bl-md">
                                <div class="text-sm text-gray-800 prose prose-sm max-w-none prose-headings:font-semibold prose-headings:text-gray-900 prose-p:my-1.5 prose-ul:my-1.5 prose-li:my-0.5 prose-strong:text-gray-900 prose-a:text-indigo-600 prose-code:text-indigo-700 prose-code:bg-indigo-50 prose-code:px-1 prose-code:rounded"
                                     x-html="typeof marked !== 'undefined' ? marked.parse(msg.text || '') : (msg.text || '')"></div>
                                <p x-show="msg.provider" class="text-[10px] text-gray-400 mt-2" x-text="'via ' + msg.provider"></p>
                            </div>

                            <!-- Item cards -->
                            <template x-if="msg.items && msg.items.length > 0">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                    <template x-for="item in msg.items" :key="item.id">
                                        <a :href="'/browse?q=' + encodeURIComponent(item.name)" class="block bg-white border border-gray-200 rounded-lg p-3 hover:border-indigo-300 hover:shadow-sm transition-all">
                                            <p class="text-sm font-medium text-gray-900" x-text="item.name"></p>
                                            <div class="flex items-center gap-2 mt-1">
                                                <span class="text-xs text-gray-500" x-text="item.category"></span>
                                                <span x-show="item.owner_name" class="text-xs text-indigo-600" x-text="'by ' + item.owner_name"></span>
                                            </div>
                                            <span x-show="item.condition" class="inline-block mt-1 text-[10px] px-1.5 py-0.5 bg-emerald-50 text-emerald-700 rounded" x-text="item.condition"></span>
                                        </a>
                                    </template>
                                </div>
                            </template>

                            <!-- Member cards -->
                            <template x-if="msg.members && msg.members.length > 0">
                                <div class="space-y-2">
                                    <template x-for="member in msg.members" :key="member.id">
                                        <a :href="'/workshop/' + (member.display_name || '').toLowerCase().replace(/\\s+/g, '-')" class="flex items-center gap-3 bg-white border border-gray-200 rounded-lg p-3 hover:border-indigo-300 hover:shadow-sm transition-all">
                                            <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0">
                                                <span class="text-sm font-semibold text-indigo-600" x-text="(member.display_name || '?')[0]"></span>
                                            </div>
                                            <div>
                                                <p class="text-sm font-medium text-gray-900" x-text="member.display_name"></p>
                                                <div class="flex items-center gap-2">
                                                    <span x-show="member.workshop_name" class="text-xs text-gray-500" x-text="member.workshop_name"></span>
                                                    <span class="text-[10px] px-1.5 py-0.5 rounded" :class="{
                                                        'bg-amber-100 text-amber-700': member.badge_tier === 'legend',
                                                        'bg-purple-100 text-purple-700': member.badge_tier === 'pillar',
                                                        'bg-emerald-100 text-emerald-700': member.badge_tier === 'trusted',
                                                        'bg-blue-100 text-blue-700': member.badge_tier === 'active',
                                                        'bg-gray-100 text-gray-600': !member.badge_tier || member.badge_tier === 'newcomer'
                                                    }" x-text="member.badge_tier || 'newcomer'"></span>
                                                </div>
                                            </div>
                                        </a>
                                    </template>
                                </div>
                            </template>

                            <!-- Suggestion chips -->
                            <template x-if="msg.suggestions && msg.suggestions.length > 0">
                                <div class="flex flex-wrap gap-2">
                                    <template x-for="sug in msg.suggestions" :key="sug">
                                        <button @click="sendQuery(sug)" class="px-3 py-1.5 text-xs bg-gray-50 text-gray-700 border border-gray-200 rounded-full hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-200 transition-colors" x-text="sug"></button>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Typing indicator -->
            <div x-show="loading" class="flex justify-start">
                <div class="bg-gray-100 px-4 py-3 rounded-2xl rounded-bl-md">
                    <div class="flex space-x-1.5">
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input area -->
        <div class="border-t border-gray-200 p-3 bg-gray-50">
            <form @submit.prevent="send()" class="flex gap-2 items-center">
                <input x-ref="input"
                       x-model="query"
                       type="text"
                       :placeholder="'{{ 'Scrivi un messaggio...' if lang == 'it' else 'Type a message...' }}'"
                       class="flex-1 min-w-0 px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none min-h-[44px]"
                       :disabled="loading"
                       autocomplete="off">
                <button type="submit"
                        :disabled="loading || !query.trim()"
                        class="px-4 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors min-h-[44px] min-w-[44px] flex items-center justify-center">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  window.LP = window.LP || {};
  window.LP.lang = "{{ lang }}";
  window.LP.t = window.LP.t || {};
  window.LP.t.loginRequired = "{% if lang == 'it' %}Effettua il login per usare il concierge.{% else %}Please log in to use the concierge.{% endif %}";
  window.LP.t.genericError = "{% if lang == 'it' %}Si è verificato un errore. Riprova.{% else %}Something went wrong. Please try again.{% endif %}";
</script>
<script src="/static/js/app/chat.js"></script>
{% endblock %}
