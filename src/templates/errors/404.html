{% extends "base.html" %}

{% block title %}{{ t('errors.not_found_title') }} - {{ t('app.name') }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-24 text-center">
    <p class="text-6xl font-bold text-indigo-600">404</p>
    <h1 class="mt-4 text-2xl font-bold text-gray-900">{{ t('errors.not_found_title') }}</h1>
    <p class="mt-2 text-gray-500">{{ t('errors.not_found_text') }}</p>
    <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
        <a href="/"
           class="w-full sm:w-auto px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors min-h-[44px] text-center">
            {{ t('errors.go_home') }}
        </a>
        <a href="/browse"
           class="w-full sm:w-auto px-6 py-3 bg-white text-gray-700 font-semibold rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors min-h-[44px] text-center">
            {{ t('browse.title') }}
        </a>
    </div>
</div>
{% endblock %}
