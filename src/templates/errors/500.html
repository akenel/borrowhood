{% extends "base.html" %}

{% block title %}{{ t('errors.server_error_title') }} - {{ t('app.name') }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-24 text-center">
    <p class="text-6xl font-bold text-red-600">500</p>
    <h1 class="mt-4 text-2xl font-bold text-gray-900">{{ t('errors.server_error_title') }}</h1>
    <p class="mt-2 text-gray-500">{{ t('errors.server_error_text') }}</p>
    <div class="mt-8">
        <a href="/"
           class="inline-flex px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors min-h-[44px]">
            {{ t('errors.go_home') }}
        </a>
    </div>
</div>
{% endblock %}
