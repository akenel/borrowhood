<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- George Clooney - Silver fox with espresso cup - "What else?" -->
  <circle cx="64" cy="64" r="64" fill="#1a1a2e"/>
  <!-- Face -->
  <circle cx="64" cy="56" r="30" fill="#e8c9a0"/>
  <!-- Silver hair -->
  <path d="M34 48 Q34 25 64 22 Q94 25 94 48 Q90 35 64 32 Q38 35 34 48Z" fill="#b0b0b0"/>
  <!-- Eyes -->
  <ellipse cx="52" cy="52" rx="4" ry="3" fill="#2d3436"/>
  <ellipse cx="76" cy="52" rx="4" ry="3" fill="#2d3436"/>
  <!-- Eyebrows -->
  <path d="M46 46 Q52 43 58 46" stroke="#555" stroke-width="2" fill="none"/>
  <path d="M70 46 Q76 43 82 46" stroke="#555" stroke-width="2" fill="none"/>
  <!-- Smile -->
  <path d="M52 64 Q64 72 76 64" stroke="#c0392b" stroke-width="2" fill="none"/>
  <!-- Stubble -->
  <rect x="48" y="66" width="32" height="8" rx="4" fill="#d4b896" opacity="0.4"/>
  <!-- Suit -->
  <path d="M30 90 Q30 78 64 80 Q98 78 98 90 L98 128 L30 128Z" fill="#2d3436"/>
  <!-- Shirt -->
  <path d="M54 80 L64 95 L74 80" fill="white"/>
  <!-- Tie -->
  <path d="M62 88 L64 105 L66 88" fill="#c0392b"/>
  <!-- ESPRESSO CUP -->
  <rect x="88" y="82" width="18" height="14" rx="3" fill="white" stroke="#666" stroke-width="1"/>
  <path d="M106 86 Q112 86 112 92 Q112 96 106 96" stroke="#666" stroke-width="1.5" fill="none"/>
  <!-- Steam -->
  <path d="M93 78 Q95 74 93 70" stroke="#ddd" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M97 79 Q99 73 97 69" stroke="#ddd" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Coffee -->
  <rect x="89" y="83" width="16" height="6" rx="2" fill="#3e2723"/>
</svg>
